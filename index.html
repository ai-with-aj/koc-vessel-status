<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOC Marine Fleet — Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0e14;
    --panel:#121925;
    --line:#243149;
    --text:#e6edf3;
    --muted:#8b97a8;
    --faint:#5d6b7e;
    --brand:#2d5bb8;
    --brand-dim:#1e3f80;
    --oos:#f85149;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    color:var(--text);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(45,91,184,.13), transparent 60%),
      radial-gradient(700px 600px at -10% 110%, rgba(88,166,255,.09), transparent 55%),
      var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    width:100%;max-width:380px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:42px 36px 38px;
    margin:24px;
    box-shadow:0 24px 64px rgba(0,0,0,.45);
  }

  .logo{
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
  }
  .anchor{
    width:52px;height:52px;border:1.5px solid var(--brand);
    border-radius:10px;display:grid;place-items:center;
    background:rgba(45,91,184,.10);
  }
  .anchor svg{width:26px;height:26px;}

  h1{
    font-family:'Oswald',sans-serif;font-weight:600;
    font-size:1.45rem;letter-spacing:.07em;text-transform:uppercase;
    text-align:center;line-height:1.1;margin-bottom:5px;
  }
  h1 span{color:var(--brand);}
  .sub{
    text-align:center;font-size:.72rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--faint);margin-bottom:32px;
  }

  .field{margin-bottom:14px;position:relative;}
  .field label{
    display:block;font-size:.65rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint);margin-bottom:7px;
    font-family:'Oswald',sans-serif;
  }
  .field input{
    width:100%;background:var(--ink);border:1px solid var(--line);
    color:var(--text);border-radius:9px;
    padding:13px 44px 13px 16px;
    font-family:'IBM Plex Mono',monospace;font-size:.9rem;
    letter-spacing:.12em;
    transition:border-color .15s,box-shadow .15s;
  }
  .field input:focus{
    outline:none;border-color:var(--brand);
    box-shadow:0 0 0 3px rgba(45,91,184,.18);
  }
  .field input.err{
    border-color:var(--oos);
    box-shadow:0 0 0 3px rgba(248,81,73,.15);
    animation:shake .35s ease;
  }
  .eye{
    position:absolute;right:13px;bottom:13px;
    background:none;border:none;cursor:pointer;color:var(--faint);
    padding:2px;display:flex;align-items:center;
  }
  .eye:hover{color:var(--muted);}
  .eye svg{width:17px;height:17px;}

  .err-msg{
    font-size:.72rem;color:var(--oos);letter-spacing:.04em;
    min-height:18px;margin-bottom:10px;
    display:flex;align-items:center;gap:6px;
  }
  .err-msg svg{width:13px;height:13px;flex:none;}

  .btn{
    width:100%;padding:14px;
    background:var(--brand);border:none;border-radius:9px;
    color:#fff;font-family:'Oswald',sans-serif;
    font-size:.9rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;cursor:pointer;
    transition:background .15s,transform .1s;
  }
  .btn:hover{background:#3668d4;}
  .btn:active{transform:scale(.98);}

  .footer{
    text-align:center;margin-top:26px;
    font-size:.65rem;letter-spacing:.08em;color:var(--faint);
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-7px);}
    40%{transform:translateX(7px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(4px);}
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="anchor">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2d5bb8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="5" r="2.4"/><line x1="12" y1="7.4" x2="12" y2="21"/>
        <line x1="7" y1="11" x2="17" y2="11"/>
        <path d="M4 14a8 8 0 0 0 16 0"/>
      </svg>
    </div>
  </div>

  <h1>Vessel Status <span>Overview</span></h1>
  <p class="sub">KOC Marine Fleet</p>

  <form id="form" autocomplete="off" onsubmit="return false;">
    <div class="field">
      <label for="pw">Access Password</label>
      <input id="pw" type="password" placeholder="••••••••" autofocus spellcheck="false"/>
      <button type="button" class="eye" id="eyeBtn" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="err-msg" id="errMsg"></div>

    <button class="btn" id="submitBtn" type="submit" onclick="tryLogin()">Enter</button>
  </form>

  <div class="footer">Kuwait Oil Company · Marine Operations</div>
</div>

<script>
const PASSWORD = 'Koc123';
const AUTH_KEY = 'koc-auth';

const pwInput  = document.getElementById('pw');
const errMsg   = document.getElementById('errMsg');
const eyeBtn   = document.getElementById('eyeBtn');
const eyeIcon  = document.getElementById('eyeIcon');

if (sessionStorage.getItem(AUTH_KEY)) {
  window.location.replace('KOC_Vessel_Status.html');
}

function tryLogin() {
  if (pwInput.value === PASSWORD) {
    sessionStorage.setItem(AUTH_KEY, '1');
    window.location.replace('KOC_Vessel_Status.html');
  } else {
    errMsg.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Incorrect password. Try again.`;
    pwInput.classList.add('err');
    pwInput.value = '';
    pwInput.focus();
    setTimeout(() => pwInput.classList.remove('err'), 400);
  }
}

pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

eyeBtn.addEventListener('click', () => {
  const isHidden = pwInput.type === 'password';
  pwInput.type = isHidden ? 'text' : 'password';
  eyeIcon.innerHTML = isHidden
    ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
});
</script>
</body>
</html>
